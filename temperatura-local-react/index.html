<!doctype html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://api.openweathermap.org" />
    <link rel="preconnect" href="https://cartodb-basemaps-a.global.ssl.fastly.net" crossorigin />
    <title>Temperatura Local</title>
  </head>
  <body class="transition-colors duration-300">
    <div id="root"></div>
    <script>
      // Prevent flash of wrong theme
      (function() {
        var theme = localStorage.getItem('temperatura-local-theme');
        if (theme === 'light') {
          document.documentElement.classList.remove('dark');
        } else if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/tempo-clima/sw.js', { scope: '/tempo-clima/' });
        });
      }
    </script>
  </body>
</html>
