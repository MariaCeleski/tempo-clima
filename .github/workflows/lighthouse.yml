name: Lighthouse CI

on:
  workflow_run:
    workflows: ["deploy"]
    types:
      - completed
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: temperatura-local-react/package-lock.json

      - name: Install dependencies
        working-directory: temperatura-local-react
        run: npm ci

      - name: Build frontend
        working-directory: temperatura-local-react
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          staticDistDir: temperatura-local-react/dist
          uploadArtifacts: true
